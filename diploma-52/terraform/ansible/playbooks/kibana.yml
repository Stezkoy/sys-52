---
- name: Установка Kibana
  hosts: kibana
  become: yes
  tasks:
    - name: Установить Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Запустить Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Запустить контейнер Kibana
      community.docker.docker_container:
        name: kibana
        image: kibana:8.11.0
        state: started
        restart_policy: always
        ports:
          - "5601:5601"
        env:
          ELASTICSEARCH_HOSTS: "http://neto-elasticsearch.ru-central1.internal:9200"