---
- name: Установка Zabbix агентов на веб-серверы
  hosts: zabbix_agents
  become: yes
  vars:
    zabbix_server_ip: "{{ hostvars['neto-zabbix.ru-central1.internal']['ansible_default_ipv4']['address'] | default('neto-zabbix.ru-central1.internal') }}"
  tasks:
    - name: Добавить GPG ключ Zabbix репозитория
      ansible.builtin.apt_key:
        url: https://repo.zabbix.com/zabbix-official-repo.key
        state: present

    - name: Добавить репозиторий Zabbix
      ansible.builtin.apt_repository:
        repo: "deb http://repo.zabbix.com/zabbix/6.0/ubuntu $(lsb_release -cs) main"
        state: present

    - name: Установить Zabbix агент
      ansible.builtin.apt:
        name: zabbix-agent
        state: present
        update_cache: yes

    - name: Настроить конфигурацию Zabbix агента
      ansible.builtin.template:
        src: ../templates/zabbix_agentd.conf.j2
        dest: /etc/zabbix/zabbix_agentd.conf
        owner: root
        group: root
        mode: '0644'

    - name: Перезапустить Zabbix агент
      ansible.builtin.systemd:
        name: zabbix-agent
        state: restarted
        enabled: yes