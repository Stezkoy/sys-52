---
- name: Установка Zabbix-агентов на все ВМ
  hosts: zabbix_agents
  become: yes
  vars:
    zabbix_server_ip: "neto-zabbix.ru-central1.internal"

  tasks:
    - name: Скачать deb-пакет репозитория Zabbix 6.0
      ansible.builtin.get_url:
        url: "https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.0-4+ubuntu22.04_all.deb"
        dest: /tmp/zabbix-release_6.0.deb
        mode: '0644'

    - name: Установить репозиторий Zabbix
      ansible.builtin.apt:
        deb: /tmp/zabbix-release_6.0.deb
        state: present

    - name: Обновить кэш apt
      ansible.builtin.apt:
        update_cache: yes

    - name: Установить Zabbix-агент
      ansible.builtin.apt:
        name: zabbix-agent
        state: present

    - name: Развернуть конфиг агента
      ansible.builtin.template:
        src: ../templates/zabbix_agentd.conf.j2
        dest: /etc/zabbix/zabbix_agentd.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart zabbix-agent

    - name: Запустить и включить zabbix-agent
      ansible.builtin.service:
        name: zabbix-agent
        state: started
        enabled: yes

  handlers:
    - name: Restart zabbix-agent
      ansible.builtin.service:
        name: zabbix-agent
        state: restarted
        enabled: yes