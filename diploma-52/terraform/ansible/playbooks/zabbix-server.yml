---
- name: Установка Zabbix-сервера 
  hosts: zabbix
  become: yes
  vars:
    zabbix_db_name: "zabbix"
    zabbix_db_user: "zabbix"
    zabbix_db_password: "zabbix"
    zabbix_timezone: "Europe/Moscow"
    zabbix_server_listen_ip: "0.0.0.0"

  tasks:
    - name: Скачать deb-пакет репозитория Zabbix 
      ansible.builtin.get_url:
        url: "https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.0-4+ubuntu22.04_all.deb"
        dest: /tmp/zabbix-release_6.0.deb
        mode: '0644'

    - name: Установить репозиторий Zabbix
      ansible.builtin.apt:
        deb: /tmp/zabbix-release_6.0.deb
        state: present

    - name: Обновить кэш apt
      ansible.builtin.apt:
        update_cache: yes

    - name: Установить Zabbix-сервер, фронтенд и SQL-скрипты
      ansible.builtin.apt:
        name:
          - zabbix-server-pgsql
          - zabbix-frontend-php
          - zabbix-apache-conf
          - zabbix-sql-scripts
        state: present

    - name: Установить PHP-модуль для PostgreSQL
      ansible.builtin.apt:
        name: php-pgsql
        state: present

    - name: Включить PHP-модули pgsql
      ansible.builtin.command:
        cmd: phpenmod pgsql pdo_pgsql
      notify: Restart apache2

    - name: Установить PostgreSQL
      ansible.builtin.apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present

    - name: Создать пользователя Zabbix в PostgreSQL
      ansible.builtin.shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ zabbix_db_user }}'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE USER {{ zabbix_db_user }} WITH ENCRYPTED PASSWORD '{{ zabbix_db_password }}';"

    - name: Создать базу данных Zabbix
      ansible.builtin.shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ zabbix_db_name }}'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE DATABASE {{ zabbix_db_name }} OWNER {{ zabbix_db_user }};"

    - name: Проверить, загружена ли схема Zabbix
      ansible.builtin.stat:
        path: /var/lib/postgresql/.zabbix_schema_loaded
      register: zabbix_schema_flag

    - name: Импортировать схему Zabbix
      ansible.builtin.shell: |
        zcat /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz | sudo -u postgres psql -d {{ zabbix_db_name }}
      when: not zabbix_schema_flag.stat.exists

    - name: Создать файл-флаг после импорта схемы
      ansible.builtin.file:
        path: /var/lib/postgresql/.zabbix_schema_loaded
        state: touch
        owner: postgres
        group: postgres
        mode: '0640'
      when: not zabbix_schema_flag.stat.exists

    - name: Выдать права пользователю Zabbix на базу
      ansible.builtin.shell: |
        if [ ! -f /var/lib/postgresql/.zabbix_grants_done ]; then
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ zabbix_db_name }} TO {{ zabbix_db_user }};"
          sudo -u postgres psql -d {{ zabbix_db_name }} -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ zabbix_db_user }};"
          sudo -u postgres psql -d {{ zabbix_db_name }} -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ zabbix_db_user }};"
          touch /var/lib/postgresql/.zabbix_grants_done
        fi
      args:
        executable: /bin/bash

    - name: Развернуть конфиг zabbix_server.conf
      ansible.builtin.template:
        src: ../templates/zabbix_server.conf.j2
        dest: /etc/zabbix/zabbix_server.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart zabbix-server

    - name: Настроить временную зону PHP в apache.conf
      ansible.builtin.lineinfile:
        path: /etc/zabbix/apache.conf
        regexp: '^\s*php_value\s+date.timezone'
        line: "        php_value date.timezone {{ zabbix_timezone }}"
        state: present
      notify: Restart apache2

    - name: Запустить и включить zabbix-server
      ansible.builtin.service:
        name: zabbix-server
        state: started
        enabled: yes

    - name: Запустить и включить apache2
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: yes

    - name: Создать конфигурацию веб-интерфейса Zabbix
      ansible.builtin.template:
        src: ../templates/zabbix.conf.php.j2
        dest: /etc/zabbix/web/zabbix.conf.php
        owner: www-data
        group: www-data
        mode: '0640'
      notify: Restart apache2

    - name: Удалить файл установщика (если остался)
      ansible.builtin.file:
        path: /usr/share/zabbix/setup.php
        state: absent
        
  handlers:
    - name: Restart zabbix-server
      ansible.builtin.service:
        name: zabbix-server
        state: restarted
        enabled: yes

    - name: Restart apache2
      ansible.builtin.service:
        name: apache2
        state: restarted
        enabled: yes
